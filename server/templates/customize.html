<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>StyleVault - Customize</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      overflow: hidden;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      touch-action: manipulation;
    }

    .top-bar {
      background: #1a1a2e;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px;
      padding-top: env(safe-area-inset-top, 0px);
      min-height: calc(44px + env(safe-area-inset-top, 0px));
      flex-shrink: 0;
      gap: 4px;
    }
    .top-bar.in-webview {
      padding-top: 0;
      min-height: 44px;
    }
    .top-bar.in-webview .back-btn {
      display: none;
    }
    .top-bar-left {
      display: flex;
      align-items: center;
    }
    .top-bar-left .back-btn {
      background: none; border: none; color: #fff; cursor: pointer;
      display: flex; align-items: center; gap: 4px; font-size: 13px;
      padding: 6px 8px; border-radius: 6px;
    }
    .top-bar-center {
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 1;
      justify-content: center;
    }
    .top-bar-center .icon-btn {
      background: none; border: none; color: rgba(255,255,255,0.6); cursor: pointer;
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      border-radius: 6px; font-size: 16px;
    }
    .top-bar-center .icon-btn:active { color: #fff; background: rgba(255,255,255,0.15); }
    .top-bar-right { display: flex; align-items: center; gap: 4px; }
    .top-bar-right button {
      background: none; border: none; color: rgba(255,255,255,0.8); cursor: pointer;
      padding: 6px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;
    }
    .top-bar-right button:active { background: rgba(255,255,255,0.15); color: #fff; }

    .mode-toggle {
      display: flex;
      background: rgba(255,255,255,0.1);
      border-radius: 6px;
      overflow: hidden;
    }
    .mode-toggle button {
      padding: 5px 10px !important;
      font-size: 11px !important;
      font-weight: 600;
      transition: all 0.2s;
      white-space: nowrap;
      border: none;
      background: none;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
    }
    .mode-toggle button.active {
      background: #e94560 !important;
      color: #fff !important;
    }

    .save-btn {
      background: #e94560 !important;
      color: #fff !important;
      border-radius: 6px;
      white-space: nowrap;
    }

    .main-area {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    .editor-2d {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .canvas-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: #eaeaea;
      overflow: hidden;
    }

    .tshirt-container {
      position: relative;
      width: 320px;
      height: 380px;
    }
    .tshirt-bg-img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      z-index: 0;
    }
    .canvas-wrapper {
      position: absolute;
      z-index: 1;
    }

    .view-switcher {
      position: absolute;
      bottom: 10px;
      right: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 10;
    }
    .view-switcher button {
      background: #fff;
      border: 2px solid #ddd;
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      color: #333;
    }
    .view-switcher button.active {
      border-color: #e94560;
      color: #e94560;
      background: #fff0f3;
    }

    .preview-3d-mini {
      position: absolute;
      bottom: 10px;
      left: 10px;
      width: 70px;
      height: 70px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .preview-3d-mini .label {
      position: absolute; top: 3px; left: 5px;
      font-size: 9px; font-weight: 700; color: #555;
    }
    .preview-3d-mini .expand {
      position: absolute; top: 3px; right: 5px;
      font-size: 10px; color: #888;
    }
    .preview-3d-mini canvas {
      width: 100% !important;
      height: 100% !important;
    }

    .tshirt-color-bar {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 10;
    }
    .tshirt-color-opt {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 2.5px solid transparent;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }
    .tshirt-color-opt.active { border-color: #e94560; }

    .bottom-toolbar {
      background: #fff;
      border-top: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 6px 8px;
      flex-shrink: 0;
      height: 52px;
    }
    .toolbar-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 4px 8px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 10px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      border-radius: 6px;
      flex: 1;
    }
    .toolbar-btn:active { background: #f0f0f0; color: #e94560; }
    .toolbar-btn svg { width: 20px; height: 20px; }

    .delete-btn {
      position: absolute;
      top: 8px; left: 50%; transform: translateX(-50%);
      background: #e94560;
      color: #fff;
      border: none;
      padding: 6px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      z-index: 20;
      display: none;
      box-shadow: 0 2px 10px rgba(233,69,96,0.3);
    }
    .delete-btn.show { display: block; }

    .editor-3d {
      flex: 1;
      display: none;
      position: relative;
      background: #f0f0f0;
    }
    .editor-3d.active { display: flex; }
    .editor-2d.hidden { display: none; }

    #three-canvas {
      width: 100%;
      height: 100%;
    }

    .minimize-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.06);
      border: none;
      width: 36px; height: 36px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #555;
      z-index: 10;
    }
    .mode-3d-label {
      position: absolute;
      top: 14px; left: 14px;
      font-size: 13px; font-weight: 700; color: #555;
      z-index: 10;
    }

    .text-modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }
    .text-modal-overlay.show { display: flex; }
    .text-modal {
      background: #fff;
      border-radius: 16px 16px 0 0;
      padding: 20px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 -10px 40px rgba(0,0,0,0.15);
      max-height: 80vh;
      overflow-y: auto;
    }
    .text-modal h3 {
      margin-bottom: 14px;
      font-size: 16px;
      color: #1a1a2e;
    }
    .text-modal input, .text-modal select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 10px;
      outline: none;
    }
    .text-modal input:focus, .text-modal select:focus { border-color: #e94560; }
    .text-modal label {
      font-size: 12px;
      font-weight: 600;
      color: #555;
      display: block;
      margin-bottom: 4px;
    }
    .text-modal-row {
      display: flex;
      gap: 10px;
    }
    .text-modal-row > div { flex: 1; }
    .text-modal-btns {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 8px;
    }
    .text-modal-btns button {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    .btn-cancel { background: #f0f0f0; color: #555; }
    .btn-add { background: #e94560; color: #fff; }

    .color-picker-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .color-swatch {
      width: 28px; height: 28px;
      border-radius: 6px;
      border: 2px solid #ddd;
      cursor: pointer;
    }
    .color-swatch.selected { border-color: #e94560; transform: scale(1.1); }

    @media (min-width: 600px) {
      .top-bar { padding: 0 16px; height: 48px; gap: 8px; }
      .top-bar-left .back-btn { font-size: 14px; padding: 6px 10px; }
      .mode-toggle button { padding: 6px 14px !important; font-size: 13px !important; }
      .top-bar-right button { font-size: 13px; padding: 6px 12px; }
      .tshirt-container { width: 500px; height: 560px; }
      .tshirt-color-opt { width: 32px; height: 32px; }
      .tshirt-color-bar { left: 16px; gap: 8px; }
      .preview-3d-mini { width: 100px; height: 100px; }
      .bottom-toolbar { height: 56px; padding: 10px 20px; justify-content: center; gap: 0; }
      .toolbar-btn {
        flex-direction: row; gap: 6px; padding: 8px 20px;
        font-size: 12px; flex: unset;
      }
      .text-modal {
        border-radius: 14px;
        max-width: 400px;
        margin-bottom: 0;
      }
      .text-modal-overlay { align-items: center; }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="top-bar-left">
      <button class="back-btn" onclick="goBack()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        <span class="back-label">Back</span>
      </button>
    </div>
    <div class="top-bar-center">
      <button class="icon-btn" onclick="undo()" title="Undo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10h10a5 5 0 015 5v2M3 10l5-5M3 10l5 5"/></svg>
      </button>
      <button class="icon-btn" onclick="redo()" title="Redo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10H11a5 5 0 00-5 5v2M21 10l-5-5M21 10l-5 5"/></svg>
      </button>
      <div class="mode-toggle">
        <button id="mode-design" class="active" onclick="switchMode('design')">Design</button>
        <button id="mode-preview" onclick="switchMode('preview')">3D</button>
      </div>
    </div>
    <div class="top-bar-right">
      <button onclick="clearCanvas()">Clear</button>
      <button class="save-btn" onclick="downloadDesign()">Save</button>
    </div>
  </div>

  <div class="main-area">
    <div class="editor-2d" id="editor-2d">
      <div class="canvas-area">
        <div class="tshirt-color-bar">
          <div class="tshirt-color-opt active" data-color="#ffffff" style="background:#ffffff;" onclick="setTshirtColor(this,'#ffffff')"></div>
          <div class="tshirt-color-opt" data-color="#111111" style="background:#111111;" onclick="setTshirtColor(this,'#111111')"></div>
          <div class="tshirt-color-opt" data-color="#e94560" style="background:#e94560;" onclick="setTshirtColor(this,'#e94560')"></div>
          <div class="tshirt-color-opt" data-color="#1a1a2e" style="background:#1a1a2e;" onclick="setTshirtColor(this,'#1a1a2e')"></div>
          <div class="tshirt-color-opt" data-color="#2ecc71" style="background:#2ecc71;" onclick="setTshirtColor(this,'#2ecc71')"></div>
          <div class="tshirt-color-opt" data-color="#3498db" style="background:#3498db;" onclick="setTshirtColor(this,'#3498db')"></div>
        </div>

        <div class="tshirt-container" id="tshirt-container">
          <img id="tshirt-bg" class="tshirt-bg-img" src="/assets/products/tshirt-front.png" crossorigin="anonymous" />
          <div class="canvas-wrapper" id="canvas-wrapper">
            <canvas id="fabric-canvas"></canvas>
          </div>
        </div>

        <button class="delete-btn" id="delete-btn" onclick="deleteSelected()">Delete</button>

        <div class="preview-3d-mini" id="mini-3d" onclick="switchMode('preview')">
          <span class="label">3D</span>
          <span class="expand">&#x2197;</span>
          <canvas id="mini-3d-canvas"></canvas>
        </div>

        <div class="view-switcher">
          <button id="view-front" class="active" onclick="switchView('front')">Front</button>
          <button id="view-back" onclick="switchView('back')">Back</button>
        </div>
      </div>

      <div class="bottom-toolbar">
        <button class="toolbar-btn" onclick="openImageUpload()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          Image
        </button>
        <button class="toolbar-btn" onclick="openTextModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3M9 20h6M12 4v16"/></svg>
          Text
        </button>
        <button class="toolbar-btn" onclick="addShape('rect')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
          Shape
        </button>
        <button class="toolbar-btn" onclick="addShape('circle')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg>
          Circle
        </button>
      </div>
    </div>

    <div class="editor-3d" id="editor-3d">
      <span class="mode-3d-label">3D Preview</span>
      <button class="minimize-btn" onclick="switchMode('design')" title="Back to Design">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 14h6v6M20 10h-6V4M14 10l7-7M3 21l7-7"/></svg>
      </button>
      <canvas id="three-canvas"></canvas>
    </div>
  </div>

  <div class="text-modal-overlay" id="text-modal">
    <div class="text-modal">
      <h3>Add Text</h3>
      <label>Text</label>
      <input type="text" id="text-input" placeholder="Enter your text..." />
      <div class="text-modal-row">
        <div>
          <label>Font</label>
          <select id="font-select">
            <option value="Arial">Arial</option>
            <option value="Helvetica">Helvetica</option>
            <option value="Georgia">Georgia</option>
            <option value="Times New Roman">Times New Roman</option>
            <option value="Courier New">Courier New</option>
            <option value="Impact">Impact</option>
            <option value="Comic Sans MS">Comic Sans MS</option>
            <option value="Verdana">Verdana</option>
          </select>
        </div>
        <div>
          <label>Size</label>
          <input type="number" id="font-size" value="24" min="8" max="120" />
        </div>
      </div>
      <label>Color</label>
      <div class="color-picker-row" id="color-picker">
        <div class="color-swatch selected" data-color="#000000" style="background:#000000" onclick="selectTextColor(this)"></div>
        <div class="color-swatch" data-color="#ffffff" style="background:#ffffff" onclick="selectTextColor(this)"></div>
        <div class="color-swatch" data-color="#e94560" style="background:#e94560" onclick="selectTextColor(this)"></div>
        <div class="color-swatch" data-color="#1a1a2e" style="background:#1a1a2e" onclick="selectTextColor(this)"></div>
        <div class="color-swatch" data-color="#f39c12" style="background:#f39c12" onclick="selectTextColor(this)"></div>
        <div class="color-swatch" data-color="#2ecc71" style="background:#2ecc71" onclick="selectTextColor(this)"></div>
        <div class="color-swatch" data-color="#3498db" style="background:#3498db" onclick="selectTextColor(this)"></div>
        <div class="color-swatch" data-color="#9b59b6" style="background:#9b59b6" onclick="selectTextColor(this)"></div>
      </div>
      <label>Style</label>
      <div class="text-modal-row" style="margin-bottom:10px">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px">
          <input type="checkbox" id="text-bold" /> Bold
        </label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px">
          <input type="checkbox" id="text-italic" /> Italic
        </label>
      </div>
      <div class="text-modal-btns">
        <button class="btn-cancel" onclick="closeTextModal()">Cancel</button>
        <button class="btn-add" onclick="addTextToCanvas()">Add</button>
      </div>
    </div>
  </div>

  <input type="file" id="image-upload" accept="image/*" style="display:none" onchange="handleImageUpload(event)" />

  <script type="module">
    import * as THREE from 'three';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const isMobile = window.innerWidth < 600;
    const CONTAINER_W = isMobile ? 320 : 500;
    const CONTAINER_H = isMobile ? 380 : 560;
    const SCALE = CONTAINER_W / 500;
    const DESIGN_W = Math.round(240 * SCALE);
    const DESIGN_H = Math.round(320 * SCALE);
    const DESIGN_LEFT = Math.round(130 * SCALE);
    const DESIGN_TOP = Math.round(80 * SCALE);

    let currentView = 'front';
    let currentMode = 'design';
    let tshirtColor = '#ffffff';
    let selectedTextColor = '#000000';

    const frontCanvasData = { json: null };
    const backCanvasData = { json: null };

    const container = document.getElementById('tshirt-container');
    container.style.width = CONTAINER_W + 'px';
    container.style.height = CONTAINER_H + 'px';

    const fabricCanvas = new fabric.Canvas('fabric-canvas', {
      width: DESIGN_W,
      height: DESIGN_H,
      backgroundColor: 'transparent',
      selection: true,
    });

    const wrapper = document.getElementById('canvas-wrapper');
    wrapper.style.left = DESIGN_LEFT + 'px';
    wrapper.style.top = DESIGN_TOP + 'px';
    wrapper.style.width = DESIGN_W + 'px';
    wrapper.style.height = DESIGN_H + 'px';

    let undoStack = [];
    let redoStack = [];
    let isUndoRedo = false;

    fabricCanvas.on('object:added', saveState);
    fabricCanvas.on('object:modified', saveState);
    fabricCanvas.on('object:removed', saveState);

    function saveState() {
      if (isUndoRedo) return;
      undoStack.push(JSON.stringify(fabricCanvas.toJSON()));
      redoStack = [];
      if (undoStack.length > 30) undoStack.shift();
      updateTexture();
      updateMini3D();
    }

    window.undo = function() {
      if (undoStack.length <= 1) return;
      isUndoRedo = true;
      redoStack.push(undoStack.pop());
      fabricCanvas.loadFromJSON(undoStack[undoStack.length - 1] || '{}', () => {
        fabricCanvas.renderAll();
        isUndoRedo = false;
        updateTexture();
      });
    };

    window.redo = function() {
      if (redoStack.length === 0) return;
      isUndoRedo = true;
      const state = redoStack.pop();
      undoStack.push(state);
      fabricCanvas.loadFromJSON(state, () => {
        fabricCanvas.renderAll();
        isUndoRedo = false;
        updateTexture();
      });
    };

    fabricCanvas.on('selection:created', () => {
      document.getElementById('delete-btn').classList.add('show');
    });
    fabricCanvas.on('selection:updated', () => {
      document.getElementById('delete-btn').classList.add('show');
    });
    fabricCanvas.on('selection:cleared', () => {
      document.getElementById('delete-btn').classList.remove('show');
    });

    window.deleteSelected = function() {
      const active = fabricCanvas.getActiveObjects();
      if (active.length) {
        active.forEach(obj => fabricCanvas.remove(obj));
        fabricCanvas.discardActiveObject();
        fabricCanvas.renderAll();
      }
    };

    function saveCurrentView() {
      const data = JSON.stringify(fabricCanvas.toJSON());
      if (currentView === 'front') frontCanvasData.json = data;
      else backCanvasData.json = data;
    }

    function loadView(view) {
      const data = view === 'front' ? frontCanvasData.json : backCanvasData.json;
      if (data) {
        fabricCanvas.loadFromJSON(data, () => fabricCanvas.renderAll());
      } else {
        fabricCanvas.clear();
        fabricCanvas.backgroundColor = 'transparent';
        fabricCanvas.renderAll();
      }
    }

    window.switchView = function(view) {
      if (view === currentView) return;
      saveCurrentView();
      currentView = view;

      document.getElementById('view-front').classList.toggle('active', view === 'front');
      document.getElementById('view-back').classList.toggle('active', view === 'back');

      const bgImg = document.getElementById('tshirt-bg');
      bgImg.src = view === 'front' ? '/assets/products/tshirt-front.png' : '/assets/products/tshirt-back.png';

      loadView(view);
      updateTexture();
    };

    window.switchMode = function(mode) {
      currentMode = mode;
      const ed2d = document.getElementById('editor-2d');
      const ed3d = document.getElementById('editor-3d');
      document.getElementById('mode-design').classList.toggle('active', mode === 'design');
      document.getElementById('mode-preview').classList.toggle('active', mode === 'preview');

      if (mode === 'preview') {
        ed2d.classList.add('hidden');
        ed3d.classList.add('active');
        saveCurrentView();
        updateTexture();
        startThreeAnimation();
      } else {
        ed3d.classList.remove('active');
        ed2d.classList.remove('hidden');
        stopThreeAnimation();
      }
    };

    window.setTshirtColor = function(el, color) {
      document.querySelectorAll('.tshirt-color-opt').forEach(e => e.classList.remove('active'));
      el.classList.add('active');
      tshirtColor = color;

      const bgImg = document.getElementById('tshirt-bg');
      const container = document.getElementById('tshirt-container');
      if (color === '#ffffff') {
        bgImg.style.filter = 'none';
        container.style.background = 'transparent';
      } else {
        bgImg.style.filter = 'none';
        container.style.background = 'transparent';
      }

      updateTexture();
      updateMini3D();
      if (tshirtMaterial) {
        tshirtMaterial.color.set(color);
      }
    };

    window.selectTextColor = function(el) {
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      el.classList.add('selected');
      selectedTextColor = el.dataset.color;
    };

    window.openTextModal = function() {
      document.getElementById('text-modal').classList.add('show');
      document.getElementById('text-input').value = '';
      setTimeout(() => document.getElementById('text-input').focus(), 100);
    };

    window.closeTextModal = function() {
      document.getElementById('text-modal').classList.remove('show');
    };

    window.addTextToCanvas = function() {
      const text = document.getElementById('text-input').value.trim();
      if (!text) return;
      const font = document.getElementById('font-select').value;
      const size = parseInt(document.getElementById('font-size').value) || 24;
      const bold = document.getElementById('text-bold').checked;
      const italic = document.getElementById('text-italic').checked;

      const fabricText = new fabric.IText(text, {
        left: DESIGN_W / 2,
        top: DESIGN_H / 2,
        originX: 'center',
        originY: 'center',
        fontFamily: font,
        fontSize: size,
        fill: selectedTextColor,
        fontWeight: bold ? 'bold' : 'normal',
        fontStyle: italic ? 'italic' : 'normal',
        editable: true,
      });

      fabricCanvas.add(fabricText);
      fabricCanvas.setActiveObject(fabricText);
      fabricCanvas.renderAll();
      closeTextModal();
    };

    window.openImageUpload = function() {
      document.getElementById('image-upload').click();
    };

    window.handleImageUpload = function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(evt) {
        fabric.Image.fromURL(evt.target.result, function(img) {
          const scale = Math.min(
            (DESIGN_W * 0.6) / img.width,
            (DESIGN_H * 0.6) / img.height
          );
          img.set({
            left: DESIGN_W / 2,
            top: DESIGN_H / 2,
            originX: 'center',
            originY: 'center',
            scaleX: scale,
            scaleY: scale,
          });
          fabricCanvas.add(img);
          fabricCanvas.setActiveObject(img);
          fabricCanvas.renderAll();
        });
      };
      reader.readAsDataURL(file);
      e.target.value = '';
    };

    window.addShape = function(type) {
      let shape;
      if (type === 'rect') {
        shape = new fabric.Rect({
          left: DESIGN_W / 2,
          top: DESIGN_H / 2,
          originX: 'center',
          originY: 'center',
          width: 80,
          height: 60,
          fill: '#e94560',
          rx: 4,
          ry: 4,
        });
      } else if (type === 'circle') {
        shape = new fabric.Circle({
          left: DESIGN_W / 2,
          top: DESIGN_H / 2,
          originX: 'center',
          originY: 'center',
          radius: 40,
          fill: '#3498db',
        });
      }
      if (shape) {
        fabricCanvas.add(shape);
        fabricCanvas.setActiveObject(shape);
        fabricCanvas.renderAll();
      }
    };

    window.clearCanvas = function() {
      if (confirm('Clear all objects on the current view?')) {
        fabricCanvas.clear();
        fabricCanvas.backgroundColor = 'transparent';
        fabricCanvas.renderAll();
        updateTexture();
      }
    };

    window.downloadDesign = function() {
      saveCurrentView();
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = 500;
      tempCanvas.height = 560;
      const ctx = tempCanvas.getContext('2d');

      ctx.fillStyle = tshirtColor;
      ctx.fillRect(0, 0, 500, 560);

      const bgImg = document.getElementById('tshirt-bg');
      ctx.drawImage(bgImg, 0, 0, 500, 560);

      const designImg = fabricCanvas.toCanvasElement();
      ctx.drawImage(designImg, 130, 80, 240, 320);

      const link = document.createElement('a');
      link.download = 'tshirt-design.png';
      link.href = tempCanvas.toDataURL('image/png');
      link.click();
    };

    let scene, camera, renderer, controls, tshirtMesh, tshirtMaterial;
    let miniScene, miniCamera, miniRenderer, miniControls, miniMesh, miniMaterial;
    let animationId = null;
    let miniAnimationId = null;

    function createTextureFromDesign() {
      const texCanvas = document.createElement('canvas');
      texCanvas.width = 1024;
      texCanvas.height = 1024;
      const ctx = texCanvas.getContext('2d');

      ctx.fillStyle = tshirtColor;
      ctx.fillRect(0, 0, 1024, 1024);

      const designCanvas = fabricCanvas.toCanvasElement();
      const sx = (1024 - 240 * 2) / 2;
      const sy = 100;
      ctx.drawImage(designCanvas, sx, sy, 240 * 2, 320 * 2);

      return texCanvas;
    }

    function updateTexture() {
      if (tshirtMaterial) {
        const texCanvas = createTextureFromDesign();
        const tex = new THREE.CanvasTexture(texCanvas);
        tex.flipY = false;
        tshirtMaterial.map = tex;
        tshirtMaterial.color.set(tshirtColor);
        tshirtMaterial.needsUpdate = true;
      }
      if (miniMaterial) {
        const texCanvas = createTextureFromDesign();
        const tex = new THREE.CanvasTexture(texCanvas);
        tex.flipY = false;
        miniMaterial.map = tex;
        miniMaterial.color.set(tshirtColor);
        miniMaterial.needsUpdate = true;
      }
    }

    function initThreeJS() {
      const canvas = document.getElementById('three-canvas');

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0xf0f0f0);

      camera = new THREE.PerspectiveCamera(35, canvas.clientWidth / canvas.clientHeight, 0.1, 100);
      camera.position.set(0, 0, 5);

      renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setSize(canvas.clientWidth, canvas.clientHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.outputColorSpace = THREE.SRGBColorSpace;

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
      scene.add(ambientLight);

      const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
      dirLight.position.set(2, 3, 4);
      scene.add(dirLight);

      const backLight = new THREE.DirectionalLight(0xffffff, 0.3);
      backLight.position.set(-2, 1, -3);
      scene.add(backLight);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.enableZoom = true;
      controls.enablePan = false;
      controls.minDistance = 1.5;
      controls.maxDistance = 6;
      controls.target.set(0, 0, 0);

      tshirtMaterial = new THREE.MeshStandardMaterial({
        color: tshirtColor,
        roughness: 0.7,
        metalness: 0.0,
        side: THREE.DoubleSide,
      });

      const loader = new OBJLoader();
      loader.load('/models/man_tshirt.obj', function(obj) {
        obj.traverse(child => {
          if (child.isMesh) {
            child.material = tshirtMaterial;
            tshirtMesh = child;
          }
        });

        const box = new THREE.Box3().setFromObject(obj);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 2.0 / maxDim;
        obj.scale.setScalar(scale);
        obj.position.sub(center.multiplyScalar(scale));

        scene.add(obj);
        updateTexture();
      });
    }

    function initMini3D() {
      const canvas = document.getElementById('mini-3d-canvas');
      const miniSize = isMobile ? 70 : 100;

      miniScene = new THREE.Scene();
      miniScene.background = new THREE.Color(0xf8f8f8);

      miniCamera = new THREE.PerspectiveCamera(35, 1, 0.1, 100);
      miniCamera.position.set(0, 0, 3);

      miniRenderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      miniRenderer.setSize(miniSize, miniSize);
      miniRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      miniRenderer.outputColorSpace = THREE.SRGBColorSpace;

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
      miniScene.add(ambientLight);
      const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
      dirLight.position.set(2, 3, 4);
      miniScene.add(dirLight);

      miniMaterial = new THREE.MeshStandardMaterial({
        color: tshirtColor,
        roughness: 0.7,
        metalness: 0.0,
        side: THREE.DoubleSide,
      });

      const loader = new OBJLoader();
      loader.load('/models/man_tshirt.obj', function(obj) {
        obj.traverse(child => {
          if (child.isMesh) {
            child.material = miniMaterial;
            miniMesh = child;
          }
        });

        const box = new THREE.Box3().setFromObject(obj);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 2.0 / maxDim;
        obj.scale.setScalar(scale);
        obj.position.sub(center.multiplyScalar(scale));

        miniScene.add(obj);
        updateTexture();
        animateMini();
      });
    }

    function animateMini() {
      miniAnimationId = requestAnimationFrame(animateMini);
      if (miniMesh) {
        miniMesh.parent.rotation.y += 0.005;
      }
      miniRenderer.render(miniScene, miniCamera);
    }

    function updateMini3D() {
      if (miniMaterial) {
        const texCanvas = createTextureFromDesign();
        const tex = new THREE.CanvasTexture(texCanvas);
        tex.flipY = false;
        miniMaterial.map = tex;
        miniMaterial.color.set(tshirtColor);
        miniMaterial.needsUpdate = true;
      }
    }

    function animateThree() {
      animationId = requestAnimationFrame(animateThree);
      controls.update();
      renderer.render(scene, camera);
    }

    function startThreeAnimation() {
      if (animationId) return;
      updateTexture();

      const canvas = document.getElementById('three-canvas');
      const parent = canvas.parentElement;
      camera.aspect = parent.clientWidth / parent.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(parent.clientWidth, parent.clientHeight);

      animateThree();
    }

    function stopThreeAnimation() {
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
    }

    window.addEventListener('resize', () => {
      if (currentMode === 'preview' && renderer && camera) {
        const canvas = document.getElementById('three-canvas');
        const parent = canvas.parentElement;
        camera.aspect = parent.clientWidth / parent.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(parent.clientWidth, parent.clientHeight);
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Delete' || e.key === 'Backspace') {
        const active = fabricCanvas.getActiveObjects();
        if (active.length && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
          active.forEach(obj => fabricCanvas.remove(obj));
          fabricCanvas.discardActiveObject();
          fabricCanvas.renderAll();
        }
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
        e.preventDefault();
        if (e.shiftKey) window.redo();
        else window.undo();
      }
    });

    window.goBack = function() {
      var sent = false;
      try {
        if (window.ReactNativeWebView) {
          window.ReactNativeWebView.postMessage('GO_BACK');
          sent = true;
        }
      } catch(e) {}
      try {
        if (window.parent && window.parent !== window) {
          window.parent.postMessage('GO_BACK', '*');
          sent = true;
        }
      } catch(e) {}
      if (!sent) {
        window.location.href = 'stylevault://back';
      }
      setTimeout(function() {
        try { window.location.href = 'stylevault://back'; } catch(e) {}
      }, 300);
    };

    undoStack.push(JSON.stringify(fabricCanvas.toJSON()));

    initThreeJS();
    initMini3D();
  </script>
</body>
</html>
